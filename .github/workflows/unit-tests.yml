name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jvm:
    name: JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      # Always build via the committed ./gradlew (Gradle 8.7, Kotlin 1.9.x).
      # Never invoke the runner's system `gradle` (9.5.x ships kotlin-stdlib 2.3):
      # configuring this build applies the com.tracewayapp.symbols plugin from the
      # included gradle-plugin build, whose 1.9.22 compiler can't read 2.3 metadata.
      - name: Run unit tests
        run: ./gradlew :traceway:testDebugUnitTest --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traceway-unit-test-report
          path: traceway/build/reports/tests/testDebugUnitTest/
